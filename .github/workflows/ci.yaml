name: CI
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  test:
    name: e2e
    runs-on:
      group: network-policy-viewer
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Cache tools
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: bin/download
          key: cache-tools-go-${{ hashFiles('go.mod') }}-${{ hashFiles('Makefile') }}
      - name: Cache files
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: cache
          key: cache-files-go-${{ hashFiles('go.mod') }}-${{ hashFiles('Makefile') }}
      - uses: ./.github/actions/aqua
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup tools
        run: make setup download-cilium-cli
      - name: Run code check
        run: make check-generate
      - name: Run lint
        run: make lint
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build cilium-agent-proxy
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: cilium-agent-proxy:dev
      - name: Run environment
        working-directory: e2e
        run: |
          make start
          make install-test-pod
          make install-policy-viewer
      - name: Test
        working-directory: e2e
        run: make test
